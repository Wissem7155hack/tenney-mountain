<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review - Tenney Mountain Landscaping & Construction LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
        .main-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 60px;
            color: #000;
            text-align: center;
            max-width: 90vw;
        }
        .form-container {
            background-color: #2d2d2d;
            border: 2px solid #c5a26a; /* Gold border */
            border-radius: 12px;
            width: 100%;
            max-width: 650px;
            min-height: 800px;
            padding: 40px 0 0 0;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .form-header {
            color: #ffffff;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
        }
        .inner-card {
            background-color: #ffffff;
            margin: 0 40px;
            padding: 50px 40px;
            min-height: 550px;
            display: flex;
            flex-direction: column;
        }
        .logo-placeholder {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-placeholder i {
            font-size: 3rem;
            color: #c5a26a;
        }
        .logo-text {
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1f2937;
        }
        .rating-option {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 5px;
            transition: background 0.2s;
        }
        .rating-option:hover {
            background-color: #f8f8f8;
        }
        .rating-option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .stars {
            color: #f1c40f;
            display: flex;
            gap: 2px;
        }
        .rating-text {
            font-weight: 700;
            color: #000;
        }
        .form-footer {
            background-color: #1a1a1a;
            padding: 24px 40px;
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        .next-btn, .submit-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .next-btn:hover, .submit-btn:hover {
            opacity: 0.8;
            color: #c5a26a;
        }
        .progress-wrapper {
            width: 100%;
            max-width: 650px;
            height: 20px;
            background-color: #e2e8f0;
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: #c5a26a;
            width: 0%;
            transition: width 0.5s ease;
            position: relative;
        }
        .progress-text {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            color: white;
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 18px;
            background-color: #f7f9fb;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            color: #2F2A28;
            font-weight: 700;
        }
        .input-group input::placeholder, .input-group textarea::placeholder {
            color: #9C92AC;
            font-weight: 700;
        }
        #step-1, #step-2 {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 768px) {
            .main-title { font-size: 2.5rem; }
            .form-container { width: 90%; }
            .inner-card { margin: 0 20px; padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <h1 class="main-title">Tenney Mountain Landscaping & Construction LLC</h1>

    <div class="form-container">
        <h2 class="form-header">How would you rate us?</h2>

        <!-- Step 1: Rating -->
        <div id="step-1">
            <div class="inner-card">
                <div class="logo-placeholder">
                    <div class="flex flex-col items-center">
                        <i class="fa-solid fa-tree text-5xl mb-4"></i>
                        <span class="logo-text text-xl md:text-2xl font-black text-center leading-tight">Tenney Mountain<br/>Landscaping & Construction LLC</span>
                        <div class="w-20 h-[1px] bg-gray-200 mt-6"></div>
                    </div>
                </div>

                <div class="mb-6">
                    <p class="font-extrabold text-lg mb-4">Please Rate Us *</p>
                    
                    <label class="rating-option">
                        <input type="radio" name="rating" value="5" onchange="goToNextStep()">
                        <div class="stars">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                        <span class="rating-text">(5 Stars)</span>
                    </label>

                    <label class="rating-option">
                        <input type="radio" name="rating" value="4" onchange="goToNextStep()">
                        <div class="stars">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                        <span class="rating-text">(4 Stars)</span>
                    </label>

                    <label class="rating-option">
                        <input type="radio" name="rating" value="3" onchange="goToNextStep()">
                        <div class="stars">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                        <span class="rating-text">(3 Stars)</span>
                    </label>

                    <label class="rating-option">
                        <input type="radio" name="rating" value="2" onchange="goToNextStep()">
                        <div class="stars">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                        <span class="rating-text">(2 Stars)</span>
                    </label>

                    <label class="rating-option">
                        <input type="radio" name="rating" value="1" onchange="goToNextStep()">
                        <div class="stars">
                            <i class="fa-solid fa-star"></i>
                        </div>
                        <span class="rating-text">(1 Star)</span>
                    </label>
                </div>
            </div>

            <div class="form-footer">
                <button class="next-btn" onclick="goToNextStep()">Next <i class="fa-solid fa-caret-right text-2xl"></i></button>
            </div>
        </div>

        <!-- Step 2: Feedback (1-3 stars) -->
        <div id="step-2" class="hidden">
            <div class="inner-card">
                <div class="input-group">
                    <label>Name (optional)</label>
                    <input type="text" placeholder="Name">
                </div>

                <div class="input-group">
                    <label>Email (optional)</label>
                    <input type="email" placeholder="Email">
                </div>

                <div class="input-group">
                    <label>Your Feedback (Please let us know what can we do to improve?)</label>
                    <textarea rows="4" placeholder="Your Feedback"></textarea>
                </div>
            </div>

            <div class="form-footer">
                <button class="submit-btn" onclick="submitFeedback()">Submit</button>
            </div>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-wrapper">
        <div id="progress-bar" class="progress-bar">
            <span id="progress-text" class="progress-text">0%</span>
        </div>
    </div>

    <script>
        let selectedRating = 0;

        function updateProgress(percent) {
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            bar.style.width = percent + '%';
            text.innerText = percent + '%';
        }

        function goToNextStep() {
            const ratings = document.getElementsByName('rating');
            for (const radio of ratings) {
                if (radio.checked) {
                    selectedRating = parseInt(radio.value);
                    break;
                }
            }

            if (selectedRating === 0) {
                alert('Please select a rating');
                return;
            }

            if (selectedRating >= 1 && selectedRating <= 3) {
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                updateProgress(50);
            } else {
                // If 4 or 5 stars, redirect to Google automatically
                window.location.href = "https://www.google.com/search?q=Tenney+Mountain+Landscaping+%26+Construction+LLC+reviews";
            }
        }

        function submitFeedback() {
            alert('Thank you for your feedback! We will use it to improve our services.');
            updateProgress(100);
            setTimeout(() => {
                window.location.href = "./";
            }, 1000);
        }
    </script>
</body>
</html>
